<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep — JS & React</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ───────────────────────────────────────────────────────────────── */
:root{
  --bg:#0b0e17;--surface:#111520;--card:#161b2e;--border:#1e2740;
  --text:#e2e8f0;--muted:#64748b;--code-bg:#0d1117;
  --success:#22c55e;--warning:#f59e0b;
  /* JS theme */
  --js-accent:#f7df1e;--js-accent2:#f59e0b;--js-accent3:#fbbf24;
  /* React theme */
  --re-accent:#61dafb;--re-accent2:#a78bfa;--re-accent3:#60a5fa;
  /* active accent (swapped on topic change) */
  --accent:var(--js-accent);--accent2:var(--js-accent2);--accent3:var(--js-accent3);
  /* level badges */
  --tag-basic-bg:#134e4a;--tag-basic:#5eead4;
  --tag-int-bg:#1e3a5f;--tag-int:#60a5fa;
  --tag-adv-bg:#3b1f5e;--tag-adv:#c084fc;
}
body.react-mode{
  --accent:var(--re-accent);--accent2:var(--re-accent2);--accent3:var(--re-accent3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── TOPIC SWITCHER ───────────────────────────────────────────────────────── */
.topic-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:7px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);
  height:42px;
}
.topic-btn{
  display:flex;align-items:center;gap:6px;
  padding:5px 16px;border-radius:20px;
  font-size:.78rem;font-weight:600;font-family:'Syne',sans-serif;
  cursor:pointer;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  transition:all .2s;letter-spacing:.02em;
}
.topic-btn:hover{color:var(--text);border-color:var(--text)}
.topic-btn.js.active{
  background:#f7df1e22;border-color:#f7df1e;color:#f7df1e;
}
.topic-btn.react.active{
  background:#61dafb22;border-color:#61dafb;color:#61dafb;
}
.topic-divider{width:1px;height:16px;background:var(--border)}
.topic-total{font-size:.68rem;color:var(--muted);margin-left:4px}

/* ── SIDEBAR ──────────────────────────────────────────────────────────────── */
.sidebar{
  position:fixed;left:0;top:42px;bottom:0;width:272px;
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;z-index:100;display:flex;flex-direction:column;
  transition:transform .3s;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.logo{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-title{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;
  line-height:1.2;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-sub{font-size:.68rem;color:var(--muted);margin-top:3px;letter-spacing:.06em;text-transform:uppercase}
.prog-wrap{padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.prog-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:6px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .4s;width:0%}
.search-wrap{padding:9px 18px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.search-icon{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.75rem;pointer-events:none}
.search-input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:7px;padding:7px 10px 7px 28px;
  color:var(--text);font-size:.8rem;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(--accent)}
.nav-hdr{
  font-family:'Syne',sans-serif;font-size:.65rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  padding:12px 18px 5px;
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:7px 18px;
  cursor:pointer;font-size:.8rem;color:var(--muted);
  border-left:2px solid transparent;transition:all .15s;user-select:none;
}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(255,255,255,.04)}
.nav-count{margin-left:auto;font-size:.67rem;background:var(--border);padding:1px 6px;border-radius:10px;color:var(--muted)}
.nav-item.active .nav-count{background:rgba(255,255,255,.1);color:var(--accent)}

/* ── MAIN ─────────────────────────────────────────────────────────────────── */
.main{margin-left:272px;padding-top:42px;min-height:100vh;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:42px;z-index:50;
  background:rgba(11,14,23,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:10px 28px;
  display:flex;align-items:center;gap:14px;
}
.topbar-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pills{display:flex;gap:5px;flex-shrink:0}
.pill{
  padding:4px 11px;border-radius:20px;font-size:.72rem;font-weight:500;
  cursor:pointer;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  transition:all .15s;font-family:'Inter',sans-serif;
}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.pill.basic.active{background:var(--tag-basic);color:#000;border-color:var(--tag-basic)}
.pill.intermediate.active{background:var(--tag-int);color:#000;border-color:var(--tag-int)}
.pill.advanced.active{background:var(--tag-adv);color:#000;border-color:var(--tag-adv)}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;padding:4px}
.content{padding:28px;flex:1}

/* ── INTRO CARD ───────────────────────────────────────────────────────────── */
.intro{
  margin-bottom:20px;padding:22px 26px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  position:relative;overflow:hidden;
}
.intro::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));
}
.intro h1{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:5px}
.intro p{color:var(--muted);font-size:.85rem;line-height:1.65;max-width:560px}
.stats-row{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.stat{
  background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:6px 13px;font-size:.78rem;display:flex;align-items:center;gap:7px;
}
.stat .n{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--accent)}
.stat .l{color:var(--muted)}

/* ── LOAD BANNER ──────────────────────────────────────────────────────────── */
.load-banner{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;margin-bottom:18px;font-size:.85rem;color:var(--accent);
}
.load-banner .spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-error{color:#ff6b9d}

/* ── QUESTION CARDS ───────────────────────────────────────────────────────── */
.q-list{display:flex;flex-direction:column;gap:2px}
.q-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:9px;overflow:hidden;transition:border-color .2s,box-shadow .2s;
}
.q-card:hover{border-color:rgba(255,255,255,.12);box-shadow:0 0 14px rgba(0,0,0,.3)}
.q-card.opened{border-color:rgba(255,255,255,.15)}
.q-hdr{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.q-num{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);min-width:28px;padding-top:2px;flex-shrink:0}
.q-title{flex:1;font-size:.88rem;font-weight:500;line-height:1.5}
.q-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-top:2px}
.badge{font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:8px;letter-spacing:.05em;text-transform:uppercase}
.badge.basic{background:var(--tag-basic-bg);color:var(--tag-basic)}
.badge.intermediate{background:var(--tag-int-bg);color:var(--tag-int)}
.badge.advanced{background:var(--tag-adv-bg);color:var(--tag-adv)}
.bm-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:1px 3px;transition:color .15s;line-height:1}
.bm-btn:hover,.bm-btn.on{color:var(--warning)}
.chevron{color:var(--muted);font-size:.7rem;transition:transform .22s;flex-shrink:0}
.q-card.opened .chevron{transform:rotate(180deg)}
.q-body{display:none;padding:0 16px 16px 56px;border-top:1px solid var(--border);animation:fadeIn .18s ease}
.q-body.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}

/* ── ANSWER CONTENT ───────────────────────────────────────────────────────── */
.ans{font-size:.85rem;line-height:1.8;color:#cbd5e1;margin-top:13px}
.ans p{margin-bottom:8px}
.ans ul,.ans ol{padding-left:18px;margin-bottom:8px}
.ans li{margin-bottom:3px}
.ans strong{color:var(--text)}
.ans em{color:var(--accent);font-style:normal}
.ans h2{color:var(--text);font-family:'Syne',sans-serif;font-size:.9rem;margin:12px 0 5px;font-weight:700}
.ans h4{color:var(--text);font-family:'Syne',sans-serif;font-size:.82rem;margin:10px 0 4px;font-weight:600}
.ans h5{color:var(--muted);font-size:.78rem;margin:8px 0 3px;font-weight:600}
.ans table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.8rem}
.ans th{background:var(--surface);color:var(--accent);padding:6px 10px;text-align:left;font-weight:600;border:1px solid var(--border)}
.ans td{padding:6px 10px;border:1px solid var(--border);vertical-align:top}
.ans tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:7px;margin:10px 0;overflow:hidden}
.code-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);
}
.code-lang{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--muted)}
.copy-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  font-size:.66rem;padding:2px 8px;border-radius:4px;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.done{border-color:var(--success);color:var(--success)}
.code-block pre{
  padding:12px 14px;overflow-x:auto;
  font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:1.65;color:#c9d1d9;
}
.code-block pre::-webkit-scrollbar{height:3px}
.code-block pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.icode{
  font-family:'JetBrains Mono',monospace;font-size:.8em;
  background:rgba(255,255,255,.07);color:var(--accent);
  padding:1px 5px;border-radius:3px;
}
.ans-img{max-width:100%;border-radius:8px;border:1px solid var(--border);margin:12px 0;display:block}

/* ── EMPTY ────────────────────────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .icon{font-size:2rem;margin-bottom:10px}
.empty p{font-size:.87rem}

/* ── SIDEBAR OVERLAY ──────────────────────────────────────────────────────── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99}

/* ── MOBILE ───────────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.active{display:block}
  .main{margin-left:0}
  .hamburger{display:block}
  .content{padding:14px}
  .q-body{padding-left:16px}
  .topbar{padding:8px 14px}
  .pills{overflow-x:auto;padding-bottom:2px}
  .topic-bar{justify-content:flex-start;padding:7px 10px;gap:5px}
  .topic-total{display:none}
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ── TOPIC SWITCHER ──────────────────────────────────────────────────────── -->
<div class="topic-bar">
  <button class="topic-btn js active" id="btn-js" onclick="switchTopic('js')">
    <span>JS</span><span>JavaScript</span>
    <span class="topic-total" id="js-total"></span>
  </button>
  <div class="topic-divider"></div>
  <button class="topic-btn react" id="btn-react" onclick="switchTopic('react')">
    <span>⚛</span><span>React</span>
    <span class="topic-total" id="react-total"></span>
  </button>
</div>

<!-- ── SIDEBAR ─────────────────────────────────────────────────────────────── -->
<nav class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-title" id="logo-title">JS Interview Prep</div>
    <div class="logo-sub" id="logo-sub">Loading…</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-label">
      <span>Progress</span>
      <span id="prog-txt">0 / …</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-in" type="text" placeholder="Search questions…">
  </div>
  <div id="nav-body"></div>
</nav>

<!-- ── MAIN ───────────────────────────────────────────────────────────────── -->
<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="topbar-title" id="top-title">Interview Prep</div>
    <div class="pills" id="pills-wrap">
      <button class="pill active" onclick="setLevel('all',this)">All</button>
      <button class="pill basic" onclick="setLevel('basic',this)">Basic</button>
      <button class="pill intermediate" onclick="setLevel('intermediate',this)">Intermediate</button>
      <button class="pill advanced" onclick="setLevel('advanced',this)">Advanced</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// TOPIC CONFIGS
// ═══════════════════════════════════════════════════════════════════════════════
const TOPICS = {
  js: {
    key:      'js',
    file:     './questions.json',
    label:    'JavaScript',
    logoTitle:'JS Interview Prep',
    bmKey:    'js-prep-bm',
    viewKey:  'js-prep-viewed',
    defaultCat: 'fundamentals',
    fallbackTotal: 478,
    categories: [
      { id:'fundamentals', icon:'🧱', title:'JavaScript Fundamentals',          desc:'Core JS concepts — types, scope, closures, storage, and browser APIs.' },
      { id:'functions',   icon:'🔧', title:'Functions & Scope',                 desc:'Currying, closures, higher-order patterns, generators, and async callbacks.' },
      { id:'objects',     icon:'🏗️', title:'Objects & Prototypes',              desc:'Prototypes, classes, Proxy, Reflect, Object internals, and inheritance.' },
      { id:'arrays',      icon:'📦', title:'Arrays, Strings & Collections',     desc:'Array/string methods, Set, Map, WeakMap, WeakSet, iterators.' },
      { id:'async',       icon:'⚡', title:'Asynchronous JavaScript',           desc:'Event loop, Promises, async/await, fetch, WebSockets and async patterns.' },
      { id:'dom',         icon:'🌐', title:'DOM, Events & Browser',             desc:'DOM manipulation, events, observers, browser APIs, security and performance.' },
      { id:'es6plus',     icon:'🚀', title:'ES6+ & Modern JavaScript',          desc:'Every modern JS feature from ES6 through ES2024 with practical examples.' },
      { id:'patterns',    icon:'⚙️', title:'Patterns, Internals & Performance', desc:'Design patterns, V8 internals, performance, TypeScript, testing and tooling.' },
    ],
  },
  react: {
    key:      'react',
    file:     './react_questions.json',
    label:    'React',
    logoTitle:'React Interview Prep',
    bmKey:    'react-prep-bm',
    viewKey:  'react-prep-viewed',
    defaultCat: 'core',
    fallbackTotal: 318,
    categories: [
      { id:'core',      icon:'⚛️', title:'Core React',                    desc:'JSX, components, state, props, events, Virtual DOM and reconciliation.' },
      { id:'hooks',     icon:'🪝', title:'React Hooks',                   desc:'useState, useEffect, useRef, useCallback, useMemo, custom hooks and more.' },
      { id:'redux',     icon:'🗂️', title:'React Redux',                   desc:'Actions, reducers, store, middleware, selectors and Redux Toolkit.' },
      { id:'router',    icon:'🧭', title:'React Router',                  desc:'Client-side routing: history, params, navigation and protected routes.' },
      { id:'testing',   icon:'🧪', title:'React Testing',                 desc:'Unit and integration testing with Jest and React Testing Library.' },
      { id:'misc',      icon:'🔧', title:'Miscellaneous',                 desc:'Advanced patterns, performance, SSR, TypeScript and real-world usage.' },
      { id:'libraries', icon:'📦', title:'Libraries & Integration',       desc:'Styled-components, Relay, Reselect and third-party integration.' },
      { id:'i18n',      icon:'🌍', title:'Internationalization',          desc:'Localizing React apps with i18n libraries, formatting and locale switching.' },
      { id:'native',    icon:'📱', title:'React Native',                  desc:'Building mobile apps with React Native and platform-specific code.' },
    ],
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// STATE — one slot per topic, lazily populated
// ═══════════════════════════════════════════════════════════════════════════════
const state = {
  js:    { data: null, loading: true, error: false, cat: 'fundamentals', level: 'all', opened: new Set(), bm: null, viewed: null },
  react: { data: null, loading: true, error: false, cat: 'core',         level: 'all', opened: new Set(), bm: null, viewed: null },
};

let activeTopic = 'js';   // 'js' | 'react'
let searchQ     = '';

// Lazily init Sets from localStorage per topic
function getStore(topic) {
  const s = state[topic];
  if (!s.bm) s.bm = new Set(JSON.parse(localStorage.getItem(TOPICS[topic].bmKey) || '[]'));
  if (!s.viewed) s.viewed = new Set(JSON.parse(localStorage.getItem(TOPICS[topic].viewKey) || '[]'));
  return s;
}

function saveStore(topic) {
  const s = state[topic];
  localStorage.setItem(TOPICS[topic].bmKey,   JSON.stringify([...s.bm]));
  localStorage.setItem(TOPICS[topic].viewKey,  JSON.stringify([...s.viewed]));
}

// ═══════════════════════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════════════════════
async function loadTopic(topic) {
  const s = state[topic];
  if (s.data || s.error) return;   // already loaded or failed
  try {
    const res = await fetch(TOPICS[topic].file);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    s.data = await res.json();
    s.cat  = TOPICS[topic].defaultCat;
    s.loading = false;
    updateTotalBadge(topic);
    if (topic === activeTopic) { buildNav(); renderContent(); updateProgress(); }
  } catch (e) {
    console.error('Failed to load', TOPICS[topic].file, e);
    s.loading = false;
    s.error   = true;
    if (topic === activeTopic) renderContent();
  }
}

function updateTotalBadge(topic) {
  const s = state[topic];
  if (!s.data) return;
  document.getElementById(topic + '-total').textContent = s.data.meta.total + ' Qs';
}

// Pre-fetch both in parallel on load
loadTopic('js');
loadTopic('react');

// ═══════════════════════════════════════════════════════════════════════════════
// TOPIC SWITCHING
// ═══════════════════════════════════════════════════════════════════════════════
function switchTopic(topic) {
  if (topic === activeTopic) return;
  activeTopic = topic;
  searchQ = '';
  document.getElementById('search-in').value = '';

  // Body class drives CSS variable theming
  document.body.classList.toggle('react-mode', topic === 'react');

  // Topic bar active state
  document.getElementById('btn-js').classList.toggle('active', topic === 'js');
  document.getElementById('btn-react').classList.toggle('active', topic === 'react');

  // Sidebar logo
  const cfg = TOPICS[topic];
  document.getElementById('logo-title').textContent = cfg.logoTitle;

  // Reset level pills to "All"
  resetPills();

  // Restore this topic's last selected category
  const s = state[topic];
  const firstCat = cfg.categories[0].id;
  if (!cfg.categories.find(c => c.id === s.cat)) s.cat = firstCat;

  buildNav();
  renderContent();
  updateProgress();
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER ENGINE  (shared by both topics)
// ═══════════════════════════════════════════════════════════════════════════════
function getCatQuestions(topic, catId) {
  const s = state[topic];
  return s.data?.categories[catId]?.questions || [];
}

function getAllQuestions(topic) {
  const s = state[topic];
  if (!s.data) return [];
  return Object.values(s.data.categories).flatMap(c => c.questions);
}

function renderContent() {
  const topic = activeTopic;
  const cfg   = TOPICS[topic];
  const s     = state[topic];
  const store = getStore(topic);
  const catCfg = cfg.categories.find(c => c.id === s.cat) || cfg.categories[0];
  const catQs  = getCatQuestions(topic, s.cat);
  const total  = s.data?.meta.total || cfg.fallbackTotal;

  document.getElementById('top-title').textContent = catCfg.title;

  let html = `<div class="intro">
    <h1>${catCfg.icon} ${catCfg.title}</h1>
    <p>${catCfg.desc}</p>
    <div class="stats-row">
      <div class="stat"><span class="n">${catQs.length || '…'}</span><span class="l">in section</span></div>
      <div class="stat"><span class="n">${store.viewed.size}</span><span class="l">studied</span></div>
      <div class="stat"><span class="n js-bm-count">${store.bm.size}</span><span class="l">bookmarked</span></div>
      <div class="stat"><span class="n">${total}</span><span class="l">total</span></div>
    </div>
  </div>`;

  if (s.loading) {
    html += `<div class="load-banner"><div class="spinner"></div>Loading ${cfg.label} questions…</div>`;
  } else if (s.error) {
    html += `<div class="load-banner load-error">⚠ Could not load <strong>${cfg.file}</strong>. Make sure it's in your <code>public/</code> folder.</div>`;
  } else {
    const qs = catQs.filter(q => {
      const lvlOk    = s.level === 'all' || q.level === s.level;
      const searchOk = !searchQ || q.q.toLowerCase().includes(searchQ) || (q.a||'').toLowerCase().includes(searchQ);
      return lvlOk && searchOk;
    });

    if (!qs.length) {
      html += `<div class="empty"><div class="icon">🔍</div><p>No questions match your filter.</p></div>`;
    } else {
      html += `<div class="q-list">`;
      qs.forEach(q => {
        const uid   = topic + '-' + q.n;  // unique across both topics
        const isOpen = s.opened.has(uid);
        const isBm   = store.bm.has(uid);
        html += `<div class="q-card${isOpen ? ' opened':''}" id="qc-${uid}">
          <div class="q-hdr" onclick="toggleQ('${uid}','${topic}',${q.n})">
            <span class="q-num">${String(q.n).padStart(3,'0')}</span>
            <span class="q-title">${esc(q.q)}</span>
            <div class="q-meta">
              <span class="badge ${q.level||'basic'}">${q.level||'basic'}</span>
              <button class="bm-btn${isBm?' on':''}" onclick="toggleBm(event,'${uid}','${topic}')">★</button>
              <span class="chevron">▼</span>
            </div>
          </div>
          <div class="q-body${isOpen?' show':''}" id="qb-${uid}">
            <div class="ans">${renderAnswer(q.a)}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
  }

  document.getElementById('content').innerHTML = html;
  updateProgress();

  // Syntax highlight visible code blocks
  requestAnimationFrame(() => {
    document.querySelectorAll('.code-block pre').forEach(el => hljs.highlightElement(el));
  });
}

function renderAnswer(raw) {
  if (!raw) return '<p style="color:var(--muted);font-style:italic">No answer available for this question.</p>';
  let html = raw;
  html = html.replace(/<pre><code[^>]*>([\s\S]*?)<\/code><\/pre>/g, (_, code) => {
    const id  = 'cb-' + Math.random().toString(36).substr(2,8);
    const lang = (raw.match(/class="language-(\w+)"/) || [])[1] || 'code';
    return `<div class="code-block"><div class="code-hdr"><span class="code-lang">${lang}</span><button class="copy-btn" onclick="cpCode('${id}')">Copy</button></div><pre id="${id}">${code.trim()}</pre></div>`;
  });
  html = html.replace(/<code[^>]*>([\s\S]*?)<\/code>/g, (_,c) => `<span class="icode">${c}</span>`);
  html = html.replace(/<img([^>]*?)>/g, (_, attrs) => {
    if (!attrs.includes('class=')) attrs += ' class="ans-img"';
    return `<img${attrs}>`;
  });
  return html;
}

function esc(s='') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════════════════════
function toggleQ(uid, topic, n) {
  const s     = state[topic];
  const store = getStore(topic);
  if (s.opened.has(uid)) {
    s.opened.delete(uid);
  } else {
    s.opened.add(uid);
    store.viewed.add(uid);
    saveStore(topic);
  }
  const card = document.getElementById('qc-' + uid);
  const body = document.getElementById('qb-' + uid);
  const open = s.opened.has(uid);
  card?.classList.toggle('opened', open);
  body?.classList.toggle('show', open);
  if (open) requestAnimationFrame(() => {
    document.querySelectorAll(`#qb-${uid} .code-block pre`).forEach(el => hljs.highlightElement(el));
  });
  updateProgress();
}

function toggleBm(e, uid, topic) {
  e.stopPropagation();
  const store = getStore(topic);
  if (store.bm.has(uid)) store.bm.delete(uid);
  else store.bm.add(uid);
  saveStore(topic);
  e.target.classList.toggle('on', store.bm.has(uid));
  // Update bookmark count in intro stats
  document.querySelectorAll('.js-bm-count').forEach(el => el.textContent = store.bm.size);
  // Update sidebar count
  buildNav();
}

function cpCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.closest('.code-block')?.querySelector('.copy-btn');
    if (btn) {
      btn.textContent = 'Copied!'; btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
    }
  });
}

window.toggleQ = toggleQ; window.toggleBm = toggleBm; window.cpCode = cpCode;

// ═══════════════════════════════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════════════════════════════
function updateProgress() {
  const topic = activeTopic;
  const s     = state[topic];
  const store = getStore(topic);
  const total = s.data?.meta.total || TOPICS[topic].fallbackTotal;
  const done  = store.viewed.size;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent  = `${done} / ${total}`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════════════════════
function buildNav() {
  const topic = activeTopic;
  const cfg   = TOPICS[topic];
  const s     = state[topic];
  const store = getStore(topic);

  // Logo sub-label
  const total = s.data?.meta.total || cfg.fallbackTotal;
  document.getElementById('logo-sub').textContent = `${total} Questions · ${cfg.label}`;

  let html = `<div class="nav-hdr">Topics</div>`;
  cfg.categories.forEach(cat => {
    const count  = getCatQuestions(topic, cat.id).length;
    const active = cat.id === s.cat;
    html += `<div class="nav-item${active?' active':''}" onclick="selectCat('${cat.id}')">
      <span>${cat.icon}</span>
      <span style="flex:1;line-height:1.3">
        ${cat.title}
        <br><span style="font-size:.65rem;opacity:.55">${count || '…'} questions</span>
      </span>
    </div>`;
  });

  html += `<div class="nav-hdr" style="margin-top:8px">Quick</div>`;
  html += `<div class="nav-item" onclick="showBookmarks()">⭐ Bookmarked<span class="nav-count">${store.bm.size}</span></div>`;
  html += `<div class="nav-item" onclick="resetProgress()">🔄 Reset Progress</div>`;

  document.getElementById('nav-body').innerHTML = html;
}

function selectCat(id) {
  const s = state[activeTopic];
  s.cat = id;
  searchQ = '';
  document.getElementById('search-in').value = '';
  resetPills();
  buildNav();
  renderContent();
  closeSidebar();
}
window.selectCat = selectCat;

function setLevel(lv, btn) {
  state[activeTopic].level = lv;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}
window.setLevel = setLevel;

function resetPills() {
  state[activeTopic].level = 'all';
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  document.querySelector('.pill:first-child')?.classList.add('active');
}

// ═══════════════════════════════════════════════════════════════════════════════
// BOOKMARKS VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function showBookmarks() {
  const topic = activeTopic;
  const s     = state[topic];
  const store = getStore(topic);
  const all   = getAllQuestions(topic);
  const bqs   = all.filter(q => store.bm.has(topic + '-' + q.n));

  document.getElementById('top-title').textContent = 'Bookmarked';

  let html = `<div class="intro">
    <h1>⭐ Bookmarked Questions</h1>
    <p>Your saved ${TOPICS[topic].label} questions for quick review.</p>
    <div class="stats-row">
      <div class="stat"><span class="n js-bm-count">${bqs.length}</span><span class="l">bookmarked</span></div>
    </div>
  </div>`;

  if (!bqs.length) {
    html += `<div class="empty"><div class="icon">⭐</div><p>No bookmarks yet — click ★ on any question.</p></div>`;
  } else {
    html += `<div class="q-list">`;
    bqs.forEach(q => {
      const uid   = topic + '-' + q.n;
      const isOpen = s.opened.has(uid);
      html += `<div class="q-card${isOpen?' opened':''}" id="qc-${uid}">
        <div class="q-hdr" onclick="toggleQ('${uid}','${topic}',${q.n})">
          <span class="q-num">${String(q.n).padStart(3,'0')}</span>
          <span class="q-title">${esc(q.q)}</span>
          <div class="q-meta">
            <span class="badge ${q.level||'basic'}">${q.level||'basic'}</span>
            <button class="bm-btn on" onclick="toggleBm(event,'${uid}','${topic}')">★</button>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="q-body${isOpen?' show':''}" id="qb-${uid}">
          <div class="ans">${renderAnswer(q.a)}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
  requestAnimationFrame(() => {
    document.querySelectorAll('.code-block pre').forEach(el => hljs.highlightElement(el));
  });
  closeSidebar();
}
window.showBookmarks = showBookmarks;

function resetProgress() {
  if (!confirm(`Reset all ${TOPICS[activeTopic].label} progress? Bookmarks are kept.`)) return;
  const store = getStore(activeTopic);
  store.viewed.clear();
  saveStore(activeTopic);
  updateProgress();
  renderContent();
}
window.resetProgress = resetProgress;

// ═══════════════════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════════════════
document.getElementById('search-in').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  renderContent();
});

// ═══════════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}
window.toggleSidebar = toggleSidebar;
window.closeSidebar  = closeSidebar;

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
// Init stores
getStore('js');
getStore('react');
buildNav();
updateProgress();
renderContent();   // will show spinner while JS JSON loads
</script>
</body>
</html>
